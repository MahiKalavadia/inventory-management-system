{% extends 'base_dashboard.html' %}
{% load static %}
{% block content %}
<div class="dashboard-topbar fixed-top d-flex justify-content-between align-items-center px-4 py-3 bg-white border-bottom"
     style="left:260px; right:0; top:0; z-index:999;">

    <!-- Page Title -->
     <div>
    <div class="fw-semibold text-uppercase text-muted">
        Settings configuration
    </div>
    </div>

    <!-- Right Section -->
    <div class="d-flex align-items-center gap-4">

        <!-- Quick Actions -->
        <div class="d-flex align-items-center gap-2">

        </div>

        <!-- User -->
        <div class="d-flex align-items-center gap-2">
            <div class="text-end">
                <div class="fw-medium small">{{ request.user.username }}</div>
                <div class="text-muted small">Configuration Panel</div>
            </div>
            {% if user.is_superuser %}
    <img src="{% static 'images/admin.jpeg' %}"
         class="rounded-circle border"
         width="36"
         height="36"
         style="object-fit: cover;">

{% elif user.groups.first.name == "Manager" %}
    <img src="{% static 'images/manager.png' %}"
         class="rounded-circle border"
         width="36"
         height="36"
         style="object-fit: cover;">

{% elif user.groups.first.name == "Staff" %}
    <img src="{% static 'images/staff.png' %}"
         class="rounded-circle border"
         width="36"
         height="36"
         style="object-fit: cover;">
         {% endif %}
        </div>
    </div>
</div>
{% endblock content %}
