{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #f3f6ff, #f9fbff);
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* MAIN CARD */
.main-card {
    width: 1100px;              /* ⬅ BIGGER */
    border-radius: 22px;        /* ⬅ SOFT CORNERS */
    box-shadow: 0px 30px 60px rgba(0,0,0,0.08);
    overflow: hidden;
    background: #fff;
}

/* LEFT IMAGE AREA */
.left-panel {
    background: #f8fbff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
}

.left-panel img {
    max-width: 90%;
}

/* RIGHT LOGIN AREA */
.login-panel {
    padding: 70px 60px;
}

.login-panel h3 {
    font-weight: 700;
    font-size: 30px;
}

/* INPUTS */
.form-control {
    height: 50px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
}

/* BUTTON FIX */
.btn-login {
    height: 54px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 16px;
    background-color: #1f2937;
    color: white;                 /* ⬅ TEXT FIX */
    border: none;
}

.btn-login:hover {
    background-color: #111827;
}

/* PASSWORD ICON */
.password-wrapper {
    position: relative;
}

.password-wrapper input {
    padding-right: 45px;
}

.toggle-password {
    position: absolute;
    right: 12px;
    top: 70%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #6b7280;
}
.left-panel {
    background-image: url("{% static 'images/3.png' %}");
    background-position: center;    
    background-size: cover;          
    background-repeat: no-repeat;
    min-height: 100%;               
}

</style>
</head>

<body>

<div class="d-flex justify-content-center align-items-center h-100">
    <div class="main-card row g-0">

        <!-- LEFT IMAGE -->
        <div class="col-md-6 left-panel"></div>

        <!-- RIGHT FORM -->
        <div class="col-md-6 login-panel">
            <h3 class="fw-bold mb-1">Login</h3>
            <p class="text-muted mb-4">Access your inventory system</p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-4 password-wrapper">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>

                <button class="btn w-100 btn-login">Login</button>
            </form>
        </div>

    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    passwordInput.type = passwordInput.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
