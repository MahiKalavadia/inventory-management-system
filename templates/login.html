{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #f3f6ff, #f9fbff);
    height: 100vh;
}

.login-card {
    width: 420px;
    border-radius: 14px;
    box-shadow: 0px 20px 40px rgba(0,0,0,0.1);
    padding: 35px;
    background: #fff;
}

.form-control {
    height: 48px;
    border-radius: 8px;
}

.btn-login {
    height: 50px;
    border-radius: 10px;
    font-weight: 500;
    font-size: 16px;
}
.password-wrapper {
    position: relative;
}

.password-wrapper input {
    padding-right: 45px;
}

.toggle-password {
    position: absolute;
    right: 12px;
    top: 70%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="d-flex justify-content-center align-items-center h-100">

    <div class="login-card">

        <h3 class="text-center fw-bold mb-1">Login to Dashboard</h3>
        <p class="text-center text-muted mb-4">Access your inventory system</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-4 password-wrapper">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" required>
                <span class="toggle-password" onclick="togglePassword(this)">👁️</span>
            </div>

            <button class="btn btn-primary w-100 btn-login">
                Login
            </button>
        </form>

    </div>

</div>
<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}
</script>

</body>
</html>
