{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
body {
    background: linear-gradient(135deg, #e6ecf0ff, #e3e9f0ff);
    height: 100vh;
    font-family: 'Inter', sans-serif;
}

/* MAIN CARD */
.main-card {
    width: 1100px;
    border-radius: 24px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.08);
}

/* LEFT PANEL WITH IMAGE */
.left-panel {
    position: relative;
    background-image: url("{% static 'images/land.png' %}");
    background-size: cover;
    background-position: center;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: white;
}

/* DARK OVERLAY */
.left-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom right,
        rgba(64, 87, 138, 0.8),
        rgba(48, 46, 95, 0.8)
    );
}

.left-content {
    position: relative;
    z-index: 2;
    text-align: left;
}

.left-content h2 {
    font-size: 34px;
    font-weight: 700;
}

.left-content p {
    margin-top: 15px;
    font-size: 15px;
    opacity: 0.95;
}

/* RIGHT PANEL */
.login-panel {
    padding: 80px 70px;
}

.login-panel h3 {
    font-weight: 700;
    font-size: 30px;
    color: #1e293b;
}

.login-panel p {
    color: #64748b;
}

/* INPUT FIELDS */
.form-control {
    height: 52px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    transition: 0.3s ease;
}

.form-control:focus {
    border-color: #bcc5d9ff;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
}

/* BUTTON */
.btn-login {
    height: 54px;
    border-radius: 14px;
    font-weight: 600;
    font-size: 16px;
    background: linear-gradient(135deg, #333f5cff, #89889fff);
    border: none;
    color: white;
    transition: 0.3s ease;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(65, 65, 79, 0.85);
}

/* PASSWORD ICON */
.password-wrapper {
    position: relative;
}

.password-wrapper input {
    padding-right: 45px;
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 70%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #94a3b8;
}

/* FADE ANIMATION */
.main-card {
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="d-flex justify-content-center align-items-center h-100">
    <div class="main-card row g-0">

        <!-- LEFT IMAGE -->
        <div class="col-md-6 left-panel">
    <div class="left-content">
        <h2>Smart Inventory</h2>
        <p>Smart inventory management & AI-driven stock forecasting system for modern businesses.</p>
    </div>
</div>

        <!-- RIGHT FORM -->
        <div class="col-md-6 login-panel">
            <h3 class="fw-bold mb-1">Login</h3>
            <p class="text-muted mb-4">Access your inventory system</p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-4 password-wrapper">
    <label class="form-label">Password</label>
    <input type="password" name="password" id="password" class="form-control" required>
    <span class="toggle-password" id="togglePassword" onclick="togglePassword()">
        <i class="bi bi-eye-slash"></i>
    </span>
</div>


                <button class="btn w-100 btn-login">Login</button>
            </form>
        </div>

    </div>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.getElementById("togglePassword").firstElementChild;

    if (passwordInput.type === "password") {
        passwordInput.type = "text";        
        toggleIcon.classList.remove("bi-eye-slash");
        toggleIcon.classList.add("bi-eye"); 
    } else {
        passwordInput.type = "password";    
        toggleIcon.classList.remove("bi-eye");
        toggleIcon.classList.add("bi-eye-slash"); 
    }
}
</script>

</body>
</html>
