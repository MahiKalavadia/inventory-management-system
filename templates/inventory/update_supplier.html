{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card shadow-sm p-4">
<h3><b><a href="{% url 'supplier_dashboard' %}" style="color: grey; font-size: 2rem;">
        <i class="bi bi-arrow-left-circle-fill"></i></a> Update Vendor</b></h3>
<hr>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{% url 'supplier_dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
</div>
</div>
{% endblock %}
