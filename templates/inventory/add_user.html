{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}
{% block content %}
    <h4><b><a href="{% url 'user_dashboard' %}" style="color: grey; font-size: 2rem;">
        <i class="bi bi-arrow-left-circle-fill"></i></a> Add New User</b></h4>
    <div class="card p-3">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy}}
            <button type="submit" class="btn btn-primary">Add User</button>
            <a href="{% url 'view_users' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
