{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h3><b><a href="{% url 'product_dashboard' %}" style="color: grey; font-size: 2rem;">
        <i class="bi bi-arrow-left-circle-fill"></i></a> Update Product</b></h3>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Update</button>
    <a href="{% url 'product_dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
