{% extends 'base_dashboard.html' %}
{% block content %}
<h2>Purchases</h2>
<a href="{% url 'purchase_create' %}" class="btn btn-primary mb-3">New Purchase</a>
<table class="table">
<tr><th>ID</th><th>Supplier</th><th>Date</th><th>Total</th><th>Status</th><th></th></tr>
{% for p in purchases %}
<tr>
<td>{{ p.id }}</td>
<td>{{ p.supplier.name }}</td>
<td>{{ p.created_at }}</td>
<td>{{ p.total_amount }}</td>
<td>{{ p.status }}</td>
<td><a href="{% url 'purchase_add_item' p.id %}" class="btn btn-success btn-sm">Add Items</a></td>
</tr>
{% endfor %}
</table>
{% endblock %}
