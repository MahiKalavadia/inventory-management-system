{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}
{%block pagetitle%}Reset Password{% endblock pagetitle%}
{% block panel %}Reset Panel{% endblock panel%}
{% block content %}
<h4>
    <b>
        <a href="{% url 'view_users' %}" style="color: grey; font-size: 2rem;">
            <i class="bi bi-arrow-left-circle-fill"></i>
        </a>
        Password Reset: {{ user.username }}
    </b>
</h4>

<div class="card p-3 mt-3">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Reset Password</button>
        <a href="{% url 'view_users' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
