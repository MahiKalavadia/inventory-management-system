{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container-fluid mt-4">
    <div class="card shadow-sm p-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="mb-0"><b>Create Order</b></h3>
            <div>
              <a href="{% url 'order_dashboard' %}" class="btn btn-outline-secondary btn-sm">
               <i class="bi bi-arrow-left-circle-fill"></i> Back
               </a>
            </div>
        </div>
    </div>
</div>
<div class="container-fluid mt-4">
    <div class="card shadow-sm p-4">
    <form method="POST">
        {% csrf_token %}

        <!-- Customer Details Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-fill me-2"></i>Customer Details</h5>
            </div>
            <div class="card-body">
                {{ order_form|crispy }}
            </div>
        </div>

        <!-- Product Details Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-box-seam me-2"></i>Products</h5>
                <button type="button" class="btn btn-light btn-sm" id="add-row">➕ Add Product</button>
            </div>
            <div class="card-body" id="formset-container">
                {{ formset.management_form }}

                {% for form in formset %}
                <div class="product-row mb-3 border p-3 rounded">
                    {{ form|crispy }}
                    <button type="button" class="btn btn-danger btn-sm remove-row mt-2">❌ Remove</button>
                </div>
                {% endfor %}

            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex justify-content-end gap-2 mb-5">
            <a href="{% url 'order_list' %}" class="btn btn-outline-secondary">← Cancel</a>
            <button type="submit" class="btn btn-primary">Place Order</button>
        </div>
    </form>
</div>
</div>
</div>
<!-- JavaScript for dynamic formset -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    const addRowBtn = document.getElementById('add-row');
    const formsetContainer = document.getElementById('formset-container');

    // Inline formset prefix
    const formPrefix = '{{ formset.prefix }}';
    const totalFormsInput = document.getElementById('id_' + formPrefix + '-TOTAL_FORMS');

    addRowBtn.addEventListener('click', function() {
        const totalForms = parseInt(totalFormsInput.value);
        const firstRow = formsetContainer.querySelector('.product-row');
        const newForm = firstRow.cloneNode(true);

        // Reset all inputs in cloned form
        newForm.querySelectorAll('input, select').forEach(input => {
            if (input.type !== 'hidden') input.value = '';
            if (input.type === 'checkbox') input.checked = false;
        });

        // Update form index
        newForm.innerHTML = newForm.innerHTML.replace(
            new RegExp(formPrefix + '-\\d+-', 'g'),
            formPrefix + '-' + totalForms + '-'
        );

        formsetContainer.appendChild(newForm);

        // Increase total forms count
        totalFormsInput.value = totalForms + 1;
    });

    // Remove row
    formsetContainer.addEventListener('click', function(e){
        if(e.target.classList.contains('remove-row')){
            const row = e.target.closest('.product-row');
            row.remove();

            // Update total forms count
            const currentRows = formsetContainer.querySelectorAll('.product-row').length;
            totalFormsInput.value = currentRows;
        }
    });
});
</script>

{% endblock %}
