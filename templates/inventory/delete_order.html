{% extends 'base_dashboard.html' %}
{% block content %}
<h3>Delete Order</h3>

<p>Are you sure you want to delete <strong>{{ order.id }}</strong>?</p>
<strong>Stock will be restored automatically.</strong>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'order_detail' order.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
