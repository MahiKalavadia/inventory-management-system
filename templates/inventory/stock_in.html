{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}
{% block content %}
<h3 class="mb-3"><b><a href="{% url 'stock_dashboard' %}" style="color: grey; font-size: 2rem;">
        <i class="bi bi-arrow-left-circle-fill"></i></a> Stock In</b></h3>
<div class="card p-4 shadow-sm">

      {% csrf_token %}

   </form>
</div>
{% endblock content %}
