{% extends 'base_dashboard.html' %}
{% load static %}
{% block content %}
<div class="dashboard-header mb-4 d-flex justify-content-between align-items-center p-3 bg-light rounded shadow-sm">
    <div class="page-title fw-bold fs-5">
        Staff Dashboard
    </div>
    <div class="d-flex align-items-center">
        <form method="GET" action="{% url 'product_list' %}" class="d-flex me-3">
            <input type="text" name="q" class="form-control me-2" placeholder="Search products..." value="{{ request.GET.q }}">
            <button class="btn btn-primary" type="submit">Search</button>
        </form>
        
        <div class="header-right d-flex align-items-center">
            <div class="welcome-text me-2">Welcome back, Staff</div>
            <img src="{% static 'images/staff.png' %}" class="profile-img rounded-circle" alt="Profile" width="40" height="40">
        </div>
    </div>
</div>
<div class="row mb-4">

    <div class="col-md-3">
        <a href="{% url 'product_list' %}" class="text-decoration-none">
        <div class="card shadow-sm p-4 text-center card-hover" style="border-left: 5px solid #2563eb">
            <div class="card-icon mb-2">
                <i class="bi bi-box-fill icon-blue icon-bg"></i>
            </div>
            <h6 class="text-muted">Total Products</h6>
            <h3 class="fw-bold">{{ total_products }}</h3>
        </div>
    </a>
    </div>

    <div class="col-md-3">
        <a href="{% url 'in_stock' %}" class="text-decoration-none">
        <div class="card shadow-sm p-4 text-center card-hover" style="border-left: 5px solid #16a34a">
            <div class="card-icon mb-2">
                <i class="bi bi-check-circle-fill icon-green icon-bg"></i>
            </div>
            <h6 class="text-muted">In Stock</h6>
            <h3 class="fw-bold">{{ in_stock }}</h3>
        </div>
    </a>
    </div>

    <div class="col-md-3">
        <a href="{% url 'low_stock' %}" class="text-decoration-none">
        <div class="card shadow-sm p-4 text-center card-hover" style="border-left: 5px solid #f97316">
            <div class="card-icon mb-2">
                <i class="bi bi-exclamation-triangle-fill icon-orange icon-bg"></i>
            </div>
            <h6 class="text-muted">Low Stock</h6>
            <h3 class="fw-bold">{{ low_stock }}</h3>
        </div>
    </a>
    </div>

    <div class="col-md-3">
        <a href="{% url 'out_stock' %}" class="text-decoration-none">
        <div class="card shadow-sm p-4 text-center card-hover" style="border-left: 5px solid #dc2626">
            <div class="card-icon mb-2">
                <i class="bi bi-x-circle-fill icon-red icon-bg"></i>
            </div>
            <h6 class="text-muted">Out of Stock</h6>
            <h3 class="fw-bold">{{ out_stock }}</h3>
        </div>
    </a>
    </div>

</div>
<hr>
{% endblock %}
