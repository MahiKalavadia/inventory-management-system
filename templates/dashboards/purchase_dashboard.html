{% extends 'base_dashboard.html' %}
{% block content %}
<div class="dashboard-header mb-4 d-flex justify-content-between align-items-center p-3 bg-light rounded shadow-sm">
    <div class="page-title fw-bold fs-5">
        Purchase Dashboard
    </div>
    <div class="d-flex align-items-center">
        <div class="header-right d-flex align-items-center">
            <div class="welcome-text me-2">Welcome to Purchase Dashboard</div>
        </div>
    </div>
</div>
<div class="mb-3 d-flex gap-2">
    
    {% if request.user.is_superuser or request.user.groups.first.name == "Manager" %}
        <a href="#" class="btn btn-primary">➕ New Purchases</a>
    {% endif %}
    <a href="#" class="btn btn-outline-secondary">📄 Generate Report</a>
</div>

{% endblock content %}
